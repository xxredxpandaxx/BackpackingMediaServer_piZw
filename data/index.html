<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Media Server</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-meta">
            <p class="eyebrow">Portable Media</p>
            <a class="nav-link nav-link--secondary nav-link--toolbar" href="/app/device" data-route>
              Admin
            </a>
          </div>
          <a class="brand" href="/app" data-route>
            <div id="brand-mark" class="brand-mark">MS</div>
            <div class="brand-copy">
              <h1 id="brand-title">Media Server</h1>
            </div>
          </a>
        </div>

        <nav class="nav">
          <a class="nav-link" href="/app" data-route>Home</a>
          <a class="nav-link" href="/app/movies" data-route>Movies</a>
          <a class="nav-link" href="/app/tv" data-route>TV Shows</a>
          <a class="nav-link" href="/app/music" data-route>Music</a>
          <a class="nav-link" href="/app/audiobooks" data-route>Audiobooks</a>
          <a class="nav-link" href="/app/documents" data-route>Documents</a>
        </nav>
      </aside>

      <main class="main">
        <header class="page-header">
          <div>
            <div id="breadcrumbs" class="breadcrumbs"></div>
            <p id="page-eyebrow" class="eyebrow">Loading</p>
            <h2 id="page-title">Building your library view...</h2>
              <p id="page-subtitle" class="page-subtitle">
                Open the Raspberry Pi Zero W server and browse your media by section.
              </p>
          </div>

          <div class="page-tools">
            <label class="search-field" for="search-input">
              <span>Search</span>
              <input id="search-input" type="search" placeholder="Search this page" />
            </label>
            <div id="page-filter-slot" class="page-filter-slot" hidden></div>
            <div id="page-actions" class="page-actions"></div>
          </div>
        </header>

        <section id="hero-spotlight" class="hero-spotlight"></section>
        <section id="page-content" class="page-content"></section>
        <section id="audio-player-section" class="audio-player-section" hidden>
          <div>
            <p class="eyebrow">Audio Player</p>
            <h3 id="audio-player-title">Nothing playing</h3>
            <p id="audio-player-summary" class="audio-player-summary"></p>
          </div>
          <audio id="audio-player" controls preload="metadata"></audio>
          <button id="audio-player-close" class="ghost-button" type="button">Close</button>
        </section>
      </main>
    </div>

    <section id="media-player-overlay" class="media-player-overlay" hidden>
      <div class="media-player-toolbar">
        <p id="player-caption"></p>
        <button id="player-close" class="ghost-button" type="button">Close</button>
      </div>
      <div class="player-card">
        <video id="video-player" controls playsinline></video>
        <iframe id="document-viewer" title="Selected file preview"></iframe>
        <div id="empty-player" class="empty-player"></div>
        <img id="image-player" alt="Selected media preview" />
      </div>
    </section>

    <template id="library-card-template">
      <article class="library-card">
        <button class="card-surface" type="button">
          <div class="card-art">
            <img class="card-art-image" alt="" loading="lazy" />
          </div>
          <div class="card-copy">
            <div class="card-topline">
              <span class="badge"></span>
              <span class="meta"></span>
            </div>
            <h3 class="card-title"></h3>
            <p class="card-subtitle"></p>
          </div>
        </button>
        <button class="card-button" type="button"></button>
      </article>
    </template>

    <template id="episode-row-template">
      <article class="episode-row">
        <div>
          <p class="episode-kicker"></p>
          <h4 class="episode-title"></h4>
          <p class="episode-meta"></p>
          <p class="episode-summary"></p>
        </div>
        <button class="card-button episode-button" type="button">Play Episode</button>
      </article>
    </template>

    <script src="/app.js"></script>
  </body>
</html>
